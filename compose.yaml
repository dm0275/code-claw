services:
  postgres:
    image: postgres:16.8-alpine
    container_name: codeclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeclaw
      POSTGRES_USER: codeclaw
      POSTGRES_PASSWORD: codeclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeclaw -d codeclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
